services:
  soundcloud-sync:
    build: .
    container_name: soundcloud-sync
    restart: unless-stopped
    environment:
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      - UMASK=${UMASK:-022}
      - SOUNDCLOUD_URL=${SOUNDCLOUD_URL:-https://soundcloud.com/ARTIST_NAME/tracks}
      - NAVIDROME_URL=${NAVIDROME_URL:-http://localhost:4533}
      - NAVIDROME_USER=${NAVIDROME_USER:-admin}
      - NAVIDROME_PASS=${NAVIDROME_PASS:-changeme}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 */6 * * *}
      - TITLE_FILTER=${TITLE_FILTER:-}
      - DATE_AFTER=${DATE_AFTER:-}
      - SPLIT_CHAPTERS=${SPLIT_CHAPTERS:-}
    volumes:
      - ${MUSIC_PATH:-/mnt/user/music/SoundCloud}:/music
      - ${STATE_PATH:-/mnt/user/appdata/soundcloud-sync}:/state
